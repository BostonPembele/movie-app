@for(movie of movies;track movie){
      <ion-card>
      <img src={{movie.Poster}} width="400px">
    <ion-card-header>
      <ion-card-title>{{movie.Yitle}}</ion-card-title>
      <ion-card-subtitle>{{movie.Year}}</ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>
      {{movie.Type}}
    </ion-card-content>
  </ion-card>
  <ion-button style="display: flex;">Select</ion-button>
  <hr>
  <br>
}


</ion-content>
